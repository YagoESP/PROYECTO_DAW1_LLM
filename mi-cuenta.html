<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - PcComponentes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', Arial, sans-serif;
        }

        /*logo*/
        .header {
            margin-bottom: 50px;
            .logo {
                width: 160px;
                height: auto;
            }
        }

        /*body*/
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
        }

        /*main*/
        .main-container {
            display: flex;
            width: 60%;
            justify-content: center;
        }

        /*columna-izquierda*/
        .info-left {
            flex-basis: 50%;
            padding-right: 50px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            justify-content: center;
        }

        .info-item {
            display: flex;
            gap: 20px;
            i{
                font-size: 32px;
                color: #333;
            }
            .texto{
                h3{
                    font-size: 18px;
                    margin-bottom: 8px;
                }
                p{
                    font-size: 14px;
                    line-height: 1.4;
                    color: #666;
                }
            }
        }

        /*columna-derecha*/
        .info-rigth {
            flex-basis: 50%;
            padding-left: 60px;
            border-left: 1px solid #b6b6b6;
            display: flex;
            flex-direction: column;
            align-items: center;
            h2{
                align-self: flex-start;
                font-size: 28px;
                margin-bottom: 25px;
            }
        }

        /*input*/
        .input-group {
            width: 100%;
            position: relative;
            margin-bottom: 20px;
            input{
                width: 100%;
                padding: 12px 15px;
                border: 1px solid #ccc;
                border-radius: 5px;
                font-size: 16px;
                color: #666;
            }
        }

        /*icono*/
        .password-icon {
            position: absolute;
            right: 15px;
            top: 13px;
            color: #333;
            cursor: pointer;
        }

        /*botón iniciar sesión*/
        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: #ff853d;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        /*botón crear cuenta*/
        a{
            width: 100%;
            .btn-create {
                width: 100%;
                padding: 12px;
                margin-top: 1rem;
                background: white;
                border: 1px solid #ddd;
                border-radius: 5px;
                font-size: 15px;
                cursor: pointer;
                color: #333;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <img src="./images/logo-llm.png" alt="PcComponentes" class="logo">
    </header>

    <main class="main-container">
        <section class="info-left">
            <div class="info-item">
                <i class="fa-solid fa-truck-fast"></i>
                <div class="texto">
                    <h3>Gestiona tus pedidos</h3>
                    <p>Ten el control de todos tus pedidos y recibe notificaciones con el seguimiento</p>
                </div>
            </div>

            <div class="info-item">
                <i class="fa-regular fa-star"></i>
                <div class="texto">
                    <h3>Lista de deseos personalizada</h3>
                    <p>Guarda tus productos favoritos en las listas de deseos personalizadas</p>
                </div>
            </div>
        </section>

        <section class="info-rigth">
            <h2>Iniciar sesión</h2>

            <div class="input-group">
                <input type="email" placeholder="E-mail*">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Contraseña*">
                <i class="fa-regular fa-eye password-icon"></i>
            </div>

            <button class="btn-login">Iniciar sesión</button>
            <a href="crear-cuenta.html">
                <button class="btn-create">Crear cuenta</button>
            </a>
        </section>
    </main>
</body>
</html>
